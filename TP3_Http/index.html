<!DOCTYPE html>
<html>
<body>
    
    <div style="width: 50%; text-align: center; background-color: red; border-radius: 8px; margin: 10px; padding: 5px;">The products</div>
        <table border="1">
            <thead>
                <th>Name</th>
                <th>Price</th>
                <th>Id</th>
            </thead>
            <tbody></tbody>
        </table>
        <br><br><button onclick="addProduct()">Ajouter Producte</button>
    <script>
 
        function addProduct() {
            let nom=window.prompt("entrer votre product ");
            let prix=Number(prompt("entrer votre prix"));
            if(nom===null || prix===null) return;

                fetch('http://localhost:3001/products', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nom,price:prix }),
                })
            .then(()=> fetch("http://localhost:3001/products"))
             .then(res => res.json())
             
             .then(res=> res.json())
            .then(data => {
                const tbody=document.querySelector("tbody");
                tbody.innerHTML="";
                data.forEach(element => {
                    tbody.innerHTML+=`<tr>
                                            <td>${element.name}</td>
                                            <td>${element.price}</td>
                                            <td>${element.id}</td>
                                        </tr>`
                    
                });

            }); 

            }
            // Ajouter ceci dans le <script>, en dehors de addProduct()
function loadProducts() {
    fetch("http://localhost:3001/products")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("tbody");
        tbody.innerHTML = "";
        data.forEach(element => {
            tbody.innerHTML += `<tr>
                <td>${element.name}</td>
                <td>${element.price}</td>
                <td>${element.id}</td>
            </tr>`;
        });
    });
}

loadProducts(); // appelé dès que la page charge
            
    </script>
</body>
</html>
